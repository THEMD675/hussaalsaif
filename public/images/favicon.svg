<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#FDFEFF"/>

  <!-- Simplified H for small sizes -->
  <g fill="#1a1a1a">
    <!-- Left stem -->
    <rect x="9" y="7" width="2" height="18"/>
    <!-- Right stem -->
    <rect x="21" y="7" width="2" height="18"/>
    <!-- Crossbar -->
    <rect x="11" y="15.5" width="10" height="1.2"/>
    <!-- Serifs -->
    <rect x="7" y="7" width="6" height="1"/>
    <rect x="19" y="7" width="6" height="1"/>
    <rect x="7" y="24" width="6" height="1"/>
    <rect x="19" y="24" width="6" height="1"/>
  </g>

  <!-- Accent -->
  <circle cx="26" cy="5.5" r="1.5" fill="#89BBdf"/>
</svg>
