<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="44" fill="#FDFEFF"/>
  <rect x="1" y="1" width="198" height="198" rx="43" fill="none" stroke="#e8edf2" stroke-width="1"/>

  <!-- Premium Didot-style H — high contrast, thin serifs -->
  <g fill="#1a1a1a">
    <!-- Left stem -->
    <rect x="64" y="54" width="7" height="92"/>
    <!-- Right stem -->
    <rect x="129" y="54" width="7" height="92"/>
    <!-- Hairline crossbar -->
    <rect x="71" y="97" width="58" height="2"/>

    <!-- Top serifs (thin, flat, unbracketed) -->
    <rect x="54" y="54" width="27" height="1.5"/>
    <rect x="119" y="54" width="27" height="1.5"/>
    <!-- Bottom serifs -->
    <rect x="54" y="144.5" width="27" height="1.5"/>
    <rect x="119" y="144.5" width="27" height="1.5"/>
  </g>

  <!-- Signature blue accent -->
  <circle cx="156" cy="44" r="4.5" fill="#89BBdf"/>
</svg>
